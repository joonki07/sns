<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>
    왜 나는 이 영상만 보게 될까?
  </title>

  <!-- CSS -->

  <link rel="stylesheet"
  href="css/style.css">

  <link rel="stylesheet"
  href="css/feed.css">

  <link rel="stylesheet"
  href="css/animation.css">

  <link rel="stylesheet"
  href="css/responsive.css">

</head>

<body>

  <!-- INTRO -->

  <section class="intro">

    <div class="background-glow"></div>

    <h1 class="main-title">
      왜 나는<br>
      이 영상만 보게 될까?
    </h1>

    <p class="intro-text">

      당신의 선택은<br>
      당신의 피드를 다시 만든다.

    </p>

    <div class="scroll-down">
      SCROLL ↓
    </div>

  </section>

  <!-- FEED -->

  <section class="feed-section">

    <h2 class="section-title">

      지금 가장 끌리는 콘텐츠를 선택하세요

    </h2>

    <!-- 카드 들어가는 영역 -->

    <div class="feed-container"
    id="feedContainer">

    </div>

  </section>

  <!-- ALGORITHM -->

  <section class="algorithm-section">

    <div class="system-title">
      ALGORITHM STATUS
    </div>

    <div class="system-box">
      ✔ 사용자 행동 분석 중...
    </div>

    <div class="system-box">
      ✔ 관심 패턴 저장...
    </div>

    <div class="system-box">
      ✔ 추천 정확도 상승...
    </div>

    <!-- 관심도 바 -->

    <div class="interest-box">

      <!-- 게임 -->

      <div class="interest-item">

        <span>
          🎮 게임
        </span>

        <div class="bar">

          <div class="fill"
          id="gameFill">

          </div>

        </div>

      </div>

      <!-- 음악 -->

      <div class="interest-item">

        <span>
          🎵 음악
        </span>

        <div class="bar">

          <div class="fill"
          id="musicFill">

          </div>

        </div>

      </div>

      <!-- 동물 -->

      <div class="interest-item">

        <span>
          🐶 동물
        </span>

        <div class="bar">

          <div class="fill"
          id="animalFill">

          </div>

        </div>

      </div>

      <!-- 운동 -->

      <div class="interest-item">

        <span>
          🏋️ 운동
        </span>

        <div class="bar">

          <div class="fill"
          id="exerciseFill">

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- FILTER BUBBLE -->

  <section class="bubble-section">

    <h2 class="bubble-title">

      당신의 피드는 점점 좁아지고 있습니다.

    </h2>

    <div class="bubble-feed"
    id="bubbleFeed">

    </div>

  </section>

  <!-- DETOX -->

  <section class="detox-section">

    <h2 class="detox-title">

      잠시 다른 콘텐츠를 만나보세요

    </h2>

    <p class="detox-text">

      추천은 편리하지만,<br>
      선택까지 대신할 필요는 없습니다.

    </p>

    <button id="resetBtn">

      피드 초기화

    </button>

  </section>

  <!-- JS -->

  <script src="js/data.js"></script>

  <script src="js/main.js"></script>

</body>
</html>
